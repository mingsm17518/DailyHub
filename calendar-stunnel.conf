; stunnel 配置文件 - 日历应用 HTTPS
; 前端 HTTPS (443 -> 3000)
[calendar-front]
accept = 443
connect = 3000
cert = /data/lx/calendar/cert.pem
key = /data/lx/calendar/key.pem

; 后端 API HTTPS (3443 -> 3001)
[calendar-api]
accept = 3443
connect = 3001
cert = /data/lx/calendar/cert.pem
key = /data/lx/calendar/key.pem
